<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yin Yang</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h1 {
  margin-bottom: 20px;
  font-size: 40px;
}

/* contenedor */
.ruleta-container {
  position: relative;
  width: 320px;
  height: 320px;
}

/* ruleta */
canvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 🔘 centro */
.centro {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 5;
}

/* 🔺 flecha desde el centro */
.flecha {
  position: absolute;
  top: -25px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 20px solid black;
}
</style>
</head>

<body>

<h1 id="resultado">...</h1>

<div class="ruleta-container">
  <canvas id="canvas"></canvas>

  <div class="centro" onclick="girar()">
    <div class="flecha"></div>
    ☯
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🔥 HD para iPhone
const size = 320;
const scale = window.devicePixelRatio || 1;

canvas.width = size * scale;
canvas.height = size * scale;
ctx.scale(scale, scale);

const total = 24;
const angulo = (2 * Math.PI) / total;

// dibujar ruleta
for (let i = 0; i < total; i++) {
  const start = i * angulo;
  const end = start + angulo;

  ctx.beginPath();
  ctx.moveTo(size/2, size/2);
  ctx.arc(size/2, size/2, size/2, start, end);
  ctx.fillStyle = i % 2 === 0 ? "white" : "black";
  ctx.fill();

  ctx.save();
  ctx.translate(size/2, size/2);
  ctx.rotate(start + angulo / 2);

  ctx.textAlign = "right";
  ctx.fillStyle = i % 2 === 0 ? "black" : "white";
  ctx.font = "bold 13px Arial";
  ctx.fillText(i % 2 === 0 ? "YES" : "NO", size/2 - 10, 5);

  ctx.restore();
}

let rotacion = 0;
let girando = false;

function girar() {
  if (girando) return;
  girando = true;

  const vueltas = Math.floor(Math.random() * 3) + 5;
  const extra = Math.random() * 360;

  rotacion += vueltas * 360 + extra;

  canvas.style.transition = "transform 4s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform = `rotate(${rotacion}deg)`;

  setTimeout(() => {
    const gradosFinal = rotacion % 360;
    const index = Math.floor(((360 - gradosFinal) % 360) / (360 / total));

    const resultado = index % 2 === 0 ? "YES" : "NO";
    document.getElementById("resultado").innerText = resultado;

    girando = false;
  }, 4000);
}
</script>

</body>
</html>
