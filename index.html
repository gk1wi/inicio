<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Yin Yang</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h2 { margin: 5px; }
h1 { margin: 10px; font-size: 40px; }

.ruleta-container {
  position: relative;
}

/* Canvas limpio */
canvas {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 🎯 Flecha en el CENTRO */
.puntero {
  position: absolute;
  width: 0;
  height: 0;
  border-top: 15px solid transparent;
  border-bottom: 15px solid transparent;
  border-left: 25px solid black;
  
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(0deg);
  z-index: 10;
}

button {
  margin-top: 25px;
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: black;
  color: white;
}
</style>
</head>

<body>

<h2>Yin Yang</h2>
<h1 id="resultado">...</h1>

<div class="ruleta-container">
  <canvas id="canvas"></canvas>
  <div class="puntero"></div>
</div>

<button onclick="girar()">Spin</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🔥 alta resolución retina
const size = 320;
const scale = window.devicePixelRatio || 1;

canvas.width = size * scale;
canvas.height = size * scale;
ctx.scale(scale, scale);

const total = 24;
const angulo = (2 * Math.PI) / total;

// dibujar ruleta HD
for (let i = 0; i < total; i++) {
  const start = i * angulo;
  const end = start + angulo;

  ctx.beginPath();
  ctx.moveTo(size/2, size/2);
  ctx.arc(size/2, size/2, size/2, start, end);
  ctx.fillStyle = i % 2 === 0 ? "white" : "black";
  ctx.fill();

  // texto
  ctx.save();
  ctx.translate(size/2, size/2);
  ctx.rotate(start + angulo / 2);

  ctx.textAlign = "right";
  ctx.fillStyle = i % 2 === 0 ? "black" : "white";
  ctx.font = "bold 13px Arial";
  ctx.fillText(i % 2 === 0 ? "YES" : "NO", size/2 - 10, 5);

  ctx.restore();
}

let rotacion = 0;
let girando = false;

function girar() {
  if (girando) return;
  girando = true;

  const vueltas = Math.floor(Math.random() * 3) + 5;
  const extra = Math.random() * 360;

  rotacion += vueltas * 360 + extra;

  canvas.style.transition = "transform 4s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform = `rotate(${rotacion}deg)`;

  setTimeout(() => {
    const gradosFinal = rotacion % 360;
    const index = Math.floor(((360 - gradosFinal) % 360) / (360 / total));

    const resultado = index % 2 === 0 ? "YES" : "NO";
    document.getElementById("resultado").innerText = resultado;

    // 📳 intento de vibración (limitado en iPhone)
    try {
      navigator.vibrate && navigator.vibrate(200);
    } catch(e) {}

    girando = false;
  }, 4000);
}
</script>

</body>
</html>
