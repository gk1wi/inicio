<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ruleta YES / NO</title>

<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
}

.ruleta-container {
  position: relative;
}

.ruleta {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 6px solid white;
  transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
}

.puntero {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 25px solid red;
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #00ff88;
  color: black;
}

h1 {
  margin-top: 20px;
  font-size: 40px;
}
</style>
</head>

<body>

<div class="ruleta-container">
  <div class="puntero"></div>
  <canvas id="canvas" width="320" height="320"></canvas>
</div>

<button onclick="girar()">Girar</button>
<h1 id="resultado">...</h1>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const total = 24;
const angulo = (2 * Math.PI) / total;

// Dibujar ruleta
for (let i = 0; i < total; i++) {
  ctx.beginPath();
  ctx.moveTo(160, 160);
  ctx.arc(160, 160, 160, i * angulo, (i + 1) * angulo);
  ctx.fillStyle = i % 2 === 0 ? "white" : "black";
  ctx.fill();
}

// estado
let rotacion = 0;
let girando = false;

function girar() {
  if (girando) return;
  girando = true;

  const vueltas = Math.floor(Math.random() * 3) + 5; // 5-7 vueltas
  const extra = Math.random() * 360;

  rotacion += (vueltas * 360) + extra;

  canvas.style.transition = "transform 4s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform = `rotate(${rotacion}deg)`;

  setTimeout(() => {
    // calcular en qué cayó
    const gradosFinal = rotacion % 360;
    const index = Math.floor(((360 - gradosFinal) % 360) / (360 / total));

    const resultado = index % 2 === 0 ? "YES" : "NO";

    document.getElementById("resultado").innerText = resultado;

    girando = false;
  }, 4000);
}
</script>

</body>
</html>
