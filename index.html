<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yin Yang</title>

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body {
  margin: 0;
  background: #f5f5f5;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h2 {
  margin: 5px 0;
}

h1 {
  margin: 5px 0 20px;
  font-size: 40px;
}

.ruleta-container {
  position: relative;
}

canvas {
  border-radius: 50%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 🔻 Flecha centrada tipo app */
.puntero {
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 30px solid black;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -180px); /* centrada arriba de la ruleta */
}

button {
  margin-top: 25px;
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: black;
  color: white;
}
</style>
</head>

<body>

<h2>Yin Yang</h2>
<h1 id="resultado">...</h1>

<div class="ruleta-container">
  <div class="puntero"></div>
  <canvas id="canvas" width="320" height="320"></canvas>
</div>

<button onclick="girar()">Spin</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const total = 24;
const angulo = (2 * Math.PI) / total;

// dibujar ruleta
for (let i = 0; i < total; i++) {
  const start = i * angulo;
  const end = start + angulo;

  ctx.beginPath();
  ctx.moveTo(160, 160);
  ctx.arc(160, 160, 160, start, end);
  ctx.fillStyle = i % 2 === 0 ? "white" : "black";
  ctx.fill();

  // texto
  ctx.save();
  ctx.translate(160, 160);
  ctx.rotate(start + angulo / 2);

  ctx.textAlign = "right";
  ctx.fillStyle = i % 2 === 0 ? "black" : "white";
  ctx.font = "bold 14px Arial";
  ctx.fillText(i % 2 === 0 ? "YES" : "NO", 140, 5);

  ctx.restore();
}

let rotacion = 0;
let girando = false;

function girar() {
  if (girando) return;
  girando = true;

  const vueltas = Math.floor(Math.random() * 3) + 5;
  const extra = Math.random() * 360;

  rotacion += vueltas * 360 + extra;

  canvas.style.transition = "transform 4s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform = `rotate(${rotacion}deg)`;

  setTimeout(() => {
    const gradosFinal = rotacion % 360;
    const index = Math.floor(((360 - gradosFinal) % 360) / (360 / total));
    const resultado = index % 2 === 0 ? "YES" : "NO";

    document.getElementById("resultado").innerText = resultado;

    // 📳 Vibración (iPhone compatible básica)
    if (navigator.vibrate) {
      navigator.vibrate(200);
    }

    girando = false;
  }, 4000);
}
</script>

</body>
</html>
