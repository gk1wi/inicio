<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Paletas" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Paletas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    :root {
      --bg:        #F5F2EE;
      --surface:   #EDEBE6;
      --border:    #D9D5CE;
      --text:      #2C2A27;
      --muted:     #7A7570;
      --accent:    #C97D4E;
      --accent-dk: #A8622F;
      --green:     #5A8A6A;
      --red:       #C05050;
      --radius:    14px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── NAV ── */
    nav {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      gap: 4px;
    }
    nav button {
      flex: 1;
      background: none;
      border: none;
      padding: 12px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── PAGES ── */
    .page { display: none; padding: 20px 16px 40px; }
    .page.active { display: block; }

    /* ── SECTION TITLE ── */
    .sec-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── FLAVOR GRID ── */
    .flavor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .flavor-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 12px 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      box-shadow: var(--shadow);
      position: relative;
    }
    .flavor-card:active { transform: scale(.97); }
    .flavor-card.out {
      opacity: .4;
      pointer-events: none;
    }
    .flavor-card .emoji { font-size: 38px; display: block; margin-bottom: 8px; }
    .flavor-card .name { font-size: 14px; font-weight: 700; }
    .flavor-card .stock-badge {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 20px;
    }
    .flavor-card.out .stock-badge { background: #fbe9e9; color: var(--red); }

    /* ── ORDER TABLE ── */
    .order-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .order-table th {
      background: var(--surface);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      padding: 10px 14px;
      text-align: left;
    }
    .order-table td {
      padding: 12px 14px;
      font-size: 14px;
      border-top: 1px solid var(--border);
    }
    .order-table .qty-cell {
      font-weight: 700;
      color: var(--accent);
    }
    .order-table .del-btn {
      background: none;
      border: none;
      color: var(--red);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }
    .order-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-summary .label { font-size: 13px; color: var(--muted); }
    .order-summary .total-count { font-size: 22px; font-weight: 800; }

    /* ── BUTTONS ── */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-align: center;
    }
    .btn:active { transform: scale(.98); opacity: .85; }
    .btn-accent  { background: var(--accent); color: white; }
    .btn-outline { background: white; color: var(--text); border: 1.5px solid var(--border); }
    .btn-green   { background: var(--green); color: white; }
    .btn-red     { background: var(--red); color: white; }
    .btn + .btn  { margin-top: 10px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 28px 20px 44px;
      width: 100%;
      max-width: 430px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal p  { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .qty-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 24px 0;
    }
    .qty-picker button {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .qty-picker button:active { background: var(--border); }
    .qty-picker .qty-num {
      font-size: 40px;
      font-weight: 800;
      min-width: 60px;
      text-align: center;
    }

    /* ── HISTORIAL ── */
    .order-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .order-card .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .order-card .order-num { font-size: 13px; font-weight: 800; color: var(--accent); }
    .order-card .order-date { font-size: 12px; color: var(--muted); }
    .order-card .order-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }
    .order-card .meta-item { font-size: 13px; }
    .order-card .meta-item span { font-weight: 700; }
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .tag-regalo  { background: #e8f5e9; color: #4CAF50; }
    .tag-familia { background: #fff3e0; color: #E65100; }
    .tag-venta   { background: #e3f2fd; color: #1565C0; }
    .order-card .card-actions { display: flex; gap: 8px; }
    .card-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .card-btn-info { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .card-btn-del  { background: #fbe9e9; color: var(--red); }

    /* ── STOCK ── */
    .stock-item {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
    }
    .stock-item .s-emoji { font-size: 30px; }
    .stock-item .s-info { flex: 1; }
    .stock-item .s-name { font-size: 15px; font-weight: 700; }
    .stock-item .s-count { font-size: 13px; color: var(--muted); }
    .stock-item .s-count b { color: var(--text); }
    .stock-item .qty-picker { margin: 0; gap: 12px; }
    .stock-item .qty-picker button { width: 38px; height: 38px; font-size: 18px; }
    .stock-item .qty-picker .qty-num { font-size: 22px; min-width: 36px; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty .e-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      transition: transform .3s ease, opacity .3s;
      opacity: 0;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }
  </style>
</head>
<body>

<header>
  <h1>🧊 Mis Paletas</h1>
  <p id="header-sub">Selecciona una sección</p>
</header>

<nav>
  <button class="active" data-page="nueva-orden">Nueva Orden</button>
  <button data-page="historial">Historial</button>
  <button data-page="stock">Stock</button>
</nav>

<!-- ══════════ NUEVA ORDEN ══════════ -->
<div id="nueva-orden" class="page active">

  <!-- PASO 1: Selector de sabores -->
  <div id="step-sabores">
    <p class="sec-title" style="margin-top:4px;">Selecciona un sabor</p>
    <div class="flavor-grid" id="flavor-grid"></div>
  </div>

  <!-- PASO 2: Tabla de orden activa -->
  <div id="step-orden" style="display:none;">
    <p class="sec-title" style="margin-top:4px;">Orden actual</p>
    <table class="order-table">
      <thead>
        <tr>
          <th>Sabor</th>
          <th>Cant.</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="orden-tbody"></tbody>
    </table>
    <div class="order-summary">
      <div>
        <div class="label">Total paletas</div>
        <div class="total-count" id="total-count">0</div>
      </div>
      <div style="text-align:right;">
        <button class="btn btn-outline" style="width:auto;padding:10px 18px;font-size:13px;" id="btn-agregar-mas">＋ Más sabores</button>
      </div>
    </div>
    <button class="btn btn-accent" id="btn-finalizar">Finalizar Orden</button>
  </div>

</div>

<!-- ══════════ HISTORIAL ══════════ -->
<div id="historial" class="page">
  <p class="sec-title" style="margin-top:4px;">Historial de pedidos</p>
  <div id="historial-list"></div>
</div>

<!-- ══════════ STOCK ══════════ -->
<div id="stock" class="page">
  <p class="sec-title" style="margin-top:4px;">Actualizar inventario</p>
  <div id="stock-list"></div>
  <button class="btn btn-accent" id="btn-save-stock" style="margin-top:8px;">Guardar cambios</button>
</div>


<!-- ══════════ MODALES ══════════ -->

<!-- Modal: Cantidad -->
<div class="modal-overlay" id="modal-cantidad">
  <div class="modal">
    <h3 id="modal-sabor-title">Sandía</h3>
    <p id="modal-sabor-stock">Disponibles: 5</p>
    <div class="qty-picker">
      <button id="qty-minus">−</button>
      <div class="qty-num" id="qty-display">1</div>
      <button id="qty-plus">＋</button>
    </div>
    <button class="btn btn-accent" id="btn-confirmar-qty">Agregar a la orden</button>
    <button class="btn btn-outline" id="btn-cancelar-qty" style="margin-top:10px;">Cancelar</button>
  </div>
</div>

<!-- Modal: Tipo de venta -->
<div class="modal-overlay" id="modal-tipo">
  <div class="modal">
    <h3>¿Tipo de orden?</h3>
    <p>Selecciona cómo se registrará esta orden.</p>
    <button class="btn btn-outline" id="btn-tipo-regalo">🎁 &nbsp;Regalo</button>
    <button class="btn btn-outline" id="btn-tipo-familia">👨‍👩‍👧 &nbsp;Familia — $2.50 / paleta</button>
    <button class="btn btn-accent"  id="btn-tipo-venta"> 💰 &nbsp;Venta — $5.00 / paleta</button>
    <button class="btn btn-outline" id="btn-cancelar-tipo" style="margin-top:14px;">Cancelar</button>
  </div>
</div>

<!-- Modal: Confirmación total -->
<div class="modal-overlay" id="modal-total">
  <div class="modal">
    <h3 id="modal-total-title">Total de la venta</h3>
    <p id="modal-total-sub"></p>
    <div style="text-align:center;margin:24px 0;">
      <div style="font-size:44px;font-weight:800;" id="modal-total-monto">$0.00</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px;" id="modal-total-desc"></div>
    </div>
    <button class="btn btn-green" id="btn-confirmar-orden">✓ Confirmar y guardar</button>
    <button class="btn btn-outline" id="btn-cancelar-total" style="margin-top:10px;">Cancelar</button>
  </div>
</div>

<!-- Modal: Detalle de orden -->
<div class="modal-overlay" id="modal-detalle">
  <div class="modal">
    <h3 id="modal-detalle-title">Detalle orden #1</h3>
    <p id="modal-detalle-meta"></p>
    <div id="modal-detalle-items" style="margin-bottom:20px;"></div>
    <button class="btn btn-outline" id="btn-cerrar-detalle">Cerrar</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════
//  DATOS BASE
// ════════════════════════════════════════
const SABORES = [
  { id:'sandia',      nombre:'Sandía',       emoji:'🍉' },
  { id:'mango_chile', nombre:'Mango c/Chile', emoji:'🥭' },
  { id:'melon',       nombre:'Melón',         emoji:'🍈' },
  { id:'uva',         nombre:'Uva',           emoji:'🍇' },
  { id:'pina',        nombre:'Piña',          emoji:'🍍' },
  { id:'limon',       nombre:'Limón',         emoji:'🍋' },
];

const PRECIO_FAMILIA = 2.5;
const PRECIO_VENTA   = 5.0;

// ════════════════════════════════════════
//  STORAGE HELPERS
// ════════════════════════════════════════
function getStock() {
  const s = localStorage.getItem('paletas_stock');
  if (s) return JSON.parse(s);
  // Stock inicial: 5 de cada uno
  const def = {};
  SABORES.forEach(f => def[f.id] = 5);
  localStorage.setItem('paletas_stock', JSON.stringify(def));
  return def;
}
function saveStock(s) { localStorage.setItem('paletas_stock', JSON.stringify(s)); }

function getHistorial() {
  const h = localStorage.getItem('paletas_historial');
  return h ? JSON.parse(h) : [];
}
function saveHistorial(h) { localStorage.setItem('paletas_historial', JSON.stringify(h)); }

// ════════════════════════════════════════
//  ESTADO DE ORDEN ACTUAL
// ════════════════════════════════════════
let ordenActual = {}; // { sabor_id: cantidad }
let saborSeleccionado = null;
let cantidadModal = 1;
let tipoOrden = null;

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
function toast(msg) {
  $('#toast').text(msg).addClass('show');
  setTimeout(() => $('#toast').removeClass('show'), 2200);
}

// ════════════════════════════════════════
//  NAV
// ════════════════════════════════════════
$('nav button').on('click', function() {
  const page = $(this).data('page');
  $('nav button').removeClass('active');
  $(this).addClass('active');
  $('.page').removeClass('active');
  $('#' + page).addClass('active');
  $('#header-sub').text($(this).text());
  if (page === 'nueva-orden') renderSabores();
  if (page === 'historial') renderHistorial();
  if (page === 'stock') renderStock();
});

// ════════════════════════════════════════
//  RENDER SABORES
// ════════════════════════════════════════
function renderSabores() {
  const stock = getStock();
  const $grid = $('#flavor-grid').empty();
  SABORES.forEach(f => {
    const qty = stock[f.id] || 0;
    const agotado = qty === 0;
    // Si ya está en orden no mostrar disponibles erróneos
    const enOrden = ordenActual[f.id] || 0;
    const disponibles = qty - enOrden;
    $grid.append(`
      <div class="flavor-card ${disponibles <= 0 ? 'out':''}" data-id="${f.id}">
        <span class="stock-badge">${disponibles <= 0 ? 'Agotado' : disponibles}</span>
        <span class="emoji">${f.emoji}</span>
        <div class="name">${f.nombre}</div>
      </div>
    `);
  });
}

// Click en sabor
$(document).on('click', '.flavor-card:not(.out)', function() {
  saborSeleccionado = $(this).data('id');
  const stock = getStock();
  const enOrden = ordenActual[saborSeleccionado] || 0;
  const maxDisp = (stock[saborSeleccionado] || 0) - enOrden;
  const sabor = SABORES.find(f => f.id === saborSeleccionado);
  cantidadModal = 1;
  $('#modal-sabor-title').text(sabor.emoji + '  ' + sabor.nombre);
  $('#modal-sabor-stock').text(`Disponibles: ${maxDisp}`);
  $('#qty-display').text(cantidadModal);
  abrirModal('#modal-cantidad');
});

// ── Qty picker
$('#qty-minus').on('click', () => {
  if (cantidadModal > 1) { cantidadModal--; $('#qty-display').text(cantidadModal); }
});
$('#qty-plus').on('click', () => {
  const stock = getStock();
  const enOrden = ordenActual[saborSeleccionado] || 0;
  const max = (stock[saborSeleccionado] || 0) - enOrden;
  if (cantidadModal < max) { cantidadModal++; $('#qty-display').text(cantidadModal); }
  else toast(`Máximo disponible: ${max}`);
});

// Confirmar cantidad
$('#btn-confirmar-qty').on('click', () => {
  const stock = getStock();
  const enOrden = ordenActual[saborSeleccionado] || 0;
  const max = (stock[saborSeleccionado] || 0) - enOrden;
  if (cantidadModal > max) { toast('No hay suficiente stock'); return; }
  ordenActual[saborSeleccionado] = (ordenActual[saborSeleccionado] || 0) + cantidadModal;
  cerrarModal('#modal-cantidad');
  mostrarTablaOrden();
});

$('#btn-cancelar-qty').on('click', () => cerrarModal('#modal-cantidad'));

// ════════════════════════════════════════
//  TABLA ORDEN
// ════════════════════════════════════════
function mostrarTablaOrden() {
  const ids = Object.keys(ordenActual).filter(k => ordenActual[k] > 0);
  if (ids.length === 0) { mostrarSabores(); return; }

  $('#step-sabores').hide();
  $('#step-orden').show();

  const $tbody = $('#orden-tbody').empty();
  let total = 0;
  ids.forEach(id => {
    const sabor = SABORES.find(f => f.id === id);
    const qty = ordenActual[id];
    total += qty;
    $tbody.append(`
      <tr>
        <td>${sabor.emoji} ${sabor.nombre}</td>
        <td class="qty-cell">${qty}</td>
        <td><button class="del-btn" data-id="${id}">✕</button></td>
      </tr>
    `);
  });
  $('#total-count').text(total);
}

// Borrar ítem de orden
$(document).on('click', '.del-btn', function() {
  const id = $(this).data('id');
  delete ordenActual[id];
  mostrarTablaOrden();
});

// Agregar más sabores
$('#btn-agregar-mas').on('click', () => {
  $('#step-orden').hide();
  $('#step-sabores').show();
  renderSabores();
});

// ════════════════════════════════════════
//  FINALIZAR ORDEN
// ════════════════════════════════════════
$('#btn-finalizar').on('click', () => {
  const total = Object.values(ordenActual).reduce((a,b)=>a+b, 0);
  if (total === 0) { toast('Agrega al menos una paleta'); return; }
  abrirModal('#modal-tipo');
});

// Tipo regalo
$('#btn-tipo-regalo').on('click', () => {
  cerrarModal('#modal-tipo');
  guardarOrden('Regalo', 0);
});

// Tipo familia
$('#btn-tipo-familia').on('click', () => {
  cerrarModal('#modal-tipo');
  tipoOrden = 'Familia';
  mostrarTotal(PRECIO_FAMILIA);
});

// Tipo venta
$('#btn-tipo-venta').on('click', () => {
  cerrarModal('#modal-tipo');
  tipoOrden = 'Venta';
  mostrarTotal(PRECIO_VENTA);
});

$('#btn-cancelar-tipo').on('click', () => cerrarModal('#modal-tipo'));

function mostrarTotal(precio) {
  const totalPaletas = Object.values(ordenActual).reduce((a,b)=>a+b,0);
  const totalDinero  = totalPaletas * precio;
  $('#modal-total-title').text(tipoOrden === 'Familia' ? '👨‍👩‍👧 Venta Familia' : '💰 Venta');
  $('#modal-total-sub').text(`${totalPaletas} paleta${totalPaletas>1?'s':''} × $${precio.toFixed(2)}`);
  $('#modal-total-monto').text(`$${totalDinero.toFixed(2)}`);
  $('#modal-total-desc').text('MXN');
  abrirModal('#modal-total');
}

$('#btn-confirmar-orden').on('click', () => {
  const precio = tipoOrden === 'Familia' ? PRECIO_FAMILIA : PRECIO_VENTA;
  const totalPaletas = Object.values(ordenActual).reduce((a,b)=>a+b,0);
  cerrarModal('#modal-total');
  guardarOrden(tipoOrden, totalPaletas * precio);
});

$('#btn-cancelar-total').on('click', () => {
  cerrarModal('#modal-total');
  // Re-abre tipo para volver a elegir
  abrirModal('#modal-tipo');
});

function guardarOrden(tipo, totalDinero) {
  // Descontar stock
  const stock = getStock();
  Object.entries(ordenActual).forEach(([id, qty]) => {
    stock[id] = Math.max(0, (stock[id] || 0) - qty);
  });
  saveStock(stock);

  // Guardar en historial
  const historial = getHistorial();
  const num = historial.length > 0 ? historial[historial.length-1].num + 1 : 1;
  const paletas = JSON.parse(JSON.stringify(ordenActual));
  historial.push({
    num,
    fecha: new Date().toLocaleString('es-MX'),
    tipo,
    paletas,
    totalPaletas: Object.values(paletas).reduce((a,b)=>a+b,0),
    totalDinero
  });
  saveHistorial(historial);

  // Reset
  ordenActual = {};
  toast(`Orden #${num} guardada ✓`);
  mostrarSabores();
}

function mostrarSabores() {
  $('#step-orden').hide();
  $('#step-sabores').show();
  renderSabores();
}

// ════════════════════════════════════════
//  HISTORIAL
// ════════════════════════════════════════
function renderHistorial() {
  const historial = getHistorial();
  const $list = $('#historial-list').empty();
  if (historial.length === 0) {
    $list.html('<div class="empty"><div class="e-icon">📋</div><p>No hay órdenes todavía.</p></div>');
    return;
  }
  [...historial].reverse().forEach(orden => {
    const tagClass = orden.tipo === 'Regalo' ? 'tag-regalo' : orden.tipo === 'Familia' ? 'tag-familia' : 'tag-venta';
    const dineroStr = orden.totalDinero > 0 ? `$${orden.totalDinero.toFixed(2)}` : '—';
    $list.append(`
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-num">Orden #${orden.num}</div>
            <div class="order-date">${orden.fecha}</div>
          </div>
          <span class="tag ${tagClass}">${orden.tipo}</span>
        </div>
        <div class="order-meta">
          <div class="meta-item">🧊 <span>${orden.totalPaletas}</span> paletas</div>
          <div class="meta-item">💵 <span>${dineroStr}</span></div>
        </div>
        <div class="card-actions">
          <button class="card-btn card-btn-info" data-num="${orden.num}">Ver detalle</button>
          <button class="card-btn card-btn-del"  data-num="${orden.num}">Borrar</button>
        </div>
      </div>
    `);
  });
}

// Ver detalle
$(document).on('click', '.card-btn-info', function() {
  const num = parseInt($(this).data('num'));
  const historial = getHistorial();
  const orden = historial.find(o => o.num === num);
  if (!orden) return;
  $('#modal-detalle-title').text(`Detalle orden #${orden.num}`);
  $('#modal-detalle-meta').text(`${orden.fecha} · ${orden.tipo}`);
  const $items = $('#modal-detalle-items').empty();
  Object.entries(orden.paletas).forEach(([id, qty]) => {
    const sabor = SABORES.find(f => f.id === id);
    $items.append(`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:15px;">${sabor.emoji} ${sabor.nombre}</span>
        <span style="font-weight:800;font-size:16px;color:var(--accent);">${qty}</span>
      </div>
    `);
  });
  if (orden.totalDinero > 0) {
    $items.append(`<div style="text-align:right;margin-top:12px;font-size:18px;font-weight:800;">Total: $${orden.totalDinero.toFixed(2)}</div>`);
  }
  abrirModal('#modal-detalle');
});

$('#btn-cerrar-detalle').on('click', () => cerrarModal('#modal-detalle'));

// Borrar orden
$(document).on('click', '.card-btn-del', function() {
  const num = parseInt($(this).data('num'));
  if (!confirm(`¿Borrar la orden #${num}? Esta acción no se puede deshacer.`)) return;
  let historial = getHistorial();
  historial = historial.filter(o => o.num !== num);
  saveHistorial(historial);
  toast(`Orden #${num} eliminada`);
  renderHistorial();
});

// ════════════════════════════════════════
//  STOCK
// ════════════════════════════════════════
let stockEdit = {};

function renderStock() {
  const stock = getStock();
  stockEdit = JSON.parse(JSON.stringify(stock));
  const $list = $('#stock-list').empty();
  SABORES.forEach(f => {
    const qty = stockEdit[f.id] || 0;
    $list.append(`
      <div class="stock-item" data-id="${f.id}">
        <span class="s-emoji">${f.emoji}</span>
        <div class="s-info">
          <div class="s-name">${f.nombre}</div>
          <div class="s-count">En stock: <b class="s-count-val">${qty}</b></div>
        </div>
        <div class="qty-picker">
          <button class="s-minus">−</button>
          <div class="qty-num s-num">${qty}</div>
          <button class="s-plus">＋</button>
        </div>
      </div>
    `);
  });
}

$(document).on('click', '.s-minus', function() {
  const $item = $(this).closest('.stock-item');
  const id = $item.data('id');
  if (stockEdit[id] > 0) {
    stockEdit[id]--;
    $item.find('.s-num').text(stockEdit[id]);
    $item.find('.s-count-val').text(stockEdit[id]);
  }
});
$(document).on('click', '.s-plus', function() {
  const $item = $(this).closest('.stock-item');
  const id = $item.data('id');
  stockEdit[id]++;
  $item.find('.s-num').text(stockEdit[id]);
  $item.find('.s-count-val').text(stockEdit[id]);
});

$('#btn-save-stock').on('click', () => {
  saveStock(stockEdit);
  toast('Stock actualizado ✓');
  renderStock();
});

// ════════════════════════════════════════
//  MODAL HELPERS
// ════════════════════════════════════════
function abrirModal(sel)  { $(sel).addClass('open'); }
function cerrarModal(sel) { $(sel).removeClass('open'); }

// Cerrar al tocar overlay
$('.modal-overlay').on('click', function(e) {
  if ($(e.target).hasClass('modal-overlay')) cerrarModal('#' + $(this).attr('id'));
});

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
$(function() {
  $('#header-sub').text('Nueva Orden');
  renderSabores();
  // Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
});
</script>
</body>
